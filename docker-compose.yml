services:   # ⚠️ THIS LINE IS REQUIRED

  backend:
    build: ./backend
    container_name: lms-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - postgres
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build: ./frontend
    container_name: lms-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run start
    env_file:
    - ./frontend/.env.local

  postgres:
    image: postgres:15
    container_name: lms-postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:6
    container_name: lms-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  postgres_data:
  mongo_data: